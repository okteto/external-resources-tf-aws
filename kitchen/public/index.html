<!DOCTYPE html>
<html>
	<head>
		<!-- Content Type Meta tag -->
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

		<!--Responsive Viewport Meta tag-->
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">


		<title>The Oktaco Shop - Kitchen</title>

		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;1,900&display=swap" rel="stylesheet">

		<link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👩🏼‍🍳</text></svg>">

		<!-- Stylesheets -->
		<link rel="stylesheet" type="text/css" href="/public/reset.min.css">
		<link rel="stylesheet" type="text/css" href="/public/style.css">
	</head>
	<body>
		<nav class="navbar">
			<a href="#" data-service="menu">🌯 Menu</a>
			<a href="#" data-service="kitchen" class="active">👩🏼‍🍳 Kitchen</a>
			<a href="#" data-service="check">🧾 Check</a>
		</nav>
		<div class="page-container">

			<img src="/public/logo.png" alt="The Oktaco Shop" class="logo" />

			<h2>Cooking queue</h2>
			<ul class="food" id="food"></ul>
	</div>

	<footer class="page-footer">
		Powered by Okteto & AWS

		<img src="/public/okteto.svg" alt="Okteto" />

	</footer>
        
        <!-- JavaScripts -->
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
		<script src="/public/main.js"></script>
		<script>
			// Set navbar links based on current hostname
			const hostname = window.location.hostname;
			const match = hostname.match(/^(menu|kitchen|check)-(.+)$/);
			if (match) {
				const rest = match[2];
				document.querySelectorAll('.navbar a').forEach(link => {
					const service = link.dataset.service;
					if (service) {
						link.href = `https://${service}-${rest}/`;
					}
				});
			}
		</script>
	</body>
</html>
